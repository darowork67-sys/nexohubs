<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdBio Rain Pro</title>

<style>
body{
margin:0;
font-family:sans-serif;
color:white;
overflow:hidden;
background: #000; /* ڕەنگی بنەڕەتی تا ڤیدیۆکە بار دەبێت */
}

/* 🌧️ VIDEO BACKGROUND */
#bgVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
pointer-events:none;
}

/* DARK OVERLAY - بۆ ئەوەی نوسینەکان ڕوون بن */
.overlay{
position:fixed;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
z-index:-1;
}

/* LOGIN */
.login-btn{
position:fixed;
top:15px;
right:15px;
padding:8px 12px;
border-radius:8px;
background:#5865F2;
font-size:13px;
cursor:pointer;
z-index:50;
}

/* MENU */
.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:25px;
cursor:pointer;
z-index:50;
}

/* PANEL */
.panel{
position:fixed;
top:0;
left:-300px;
width:300px;
height:100%;
background:rgba(2, 6, 23, 0.95);
padding:15px;
transition:0.3s;
overflow:auto;
z-index:100;
backdrop-filter: blur(10px);
}
.panel.active{left:0;}

input,textarea,button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
border-radius:6px;
background: rgba(255,255,255,0.1);
color: white;
}

button {
    background: #a855f7;
    cursor: pointer;
    font-weight: bold;
}

/* VOLUME CONTROL STYLE */
.volume-container {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    margin-top: 20px;
}

input[type=range] {
    cursor: pointer;
}

/* CARD */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
text-align:center;
box-shadow:0 0 50px rgba(168, 85, 247, 0.4);
border: 1px solid rgba(255,255,255,0.1);
}

/* SOCIAL LINKS */
.link{
display:block;
margin:8px 0;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
text-decoration:none;
transition:0.2s;
}

.link:hover{
background:#a855f7;
}

/* FOOTER */
.footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:13px;
opacity:0.7;
}
</style>
</head>

<body onclick="startRainSound()">

<video id="bgVideo" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-rain-drops-on-a-window-1558-large.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="rainSound" loop>
    <source src="https://www.soundjay.com/nature/rain-01.mp3" type="audio/mpeg">
</audio>

<div class="login-btn" onclick="discordLogin()">Login</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="panel" id="panel">
    <h3>Dashboard</h3>

    <h4>👤 Profile</h4>
    <input id="nameInput" placeholder="Name">
    <textarea id="bioInput" placeholder="Bio"></textarea>
    <button onclick="saveProfile()">Save Profile</button>

    <div class="volume-container">
        <h4>🔊 Rain Volume</h4>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
    </div>

    <h4>🔗 Social Links</h4>
    <input id="linkName" placeholder="Platform (e.g. Instagram)">
    <input id="linkURL" placeholder="https://...">
    <button onclick="addLink()">Add Link</button>

    <div id="linkList" style="margin-top:10px;"></div>
</div>

<div class="card">
    <h2 id="nameDisplay">Your Name</h2>
    <p id="bioDisplay">Your Bio</p>

    <div id="linksContainer"></div>
</div>

<div class="footer">Developed By DaRoO</div>

<script>
const rainSound = document.getElementById("rainSound");
const panel = document.getElementById("panel");

/* MENU TOGGLE */
function toggleMenu(){
    panel.classList.toggle("active");
}

/* PROFILE SYSTEM */
function saveProfile(){
    localStorage.setItem("name", document.getElementById("nameInput").value);
    localStorage.setItem("bio", document.getElementById("bioInput").value);
    loadProfile();
}

function loadProfile(){
    document.getElementById("nameDisplay").innerText = localStorage.getItem("name") || "Your Name";
    document.getElementById("bioDisplay").innerText = localStorage.getItem("bio") || "Your Bio";
}

/* 🔊 SOUND CONTROL */
let started = false;
function startRainSound(){
    if(!started){
        rainSound.play();
        rainSound.volume = 0.5;
        started = true;
    }
}

function changeVolume(val) {
    rainSound.volume = val;
}

/* 🔗 SOCIAL SYSTEM */
let links = JSON.parse(localStorage.getItem("links")) || [];

function addLink(){
    let n = document.getElementById("linkName").value;
    let u = document.getElementById("linkURL").value;
    if(!n || !u) return;

    links.push({n, u});
    localStorage.setItem("links", JSON.stringify(links));
    renderLinks();

    document.getElementById("linkName").value = "";
    document.getElementById("linkURL").value = "";
}

function renderLinks(){
    let container = document.getElementById("linksContainer");
    let list = document.getElementById("linkList");

    container.innerHTML = "";
    list.innerHTML = "";

    links.forEach((l, i) => {
        // Show on Card
        let a = document.createElement("a");
        a.href = l.u;
        a.innerText = l.n;
        a.className = "link";
        a.target = "_blank";
        container.appendChild(a);

        // Show in Dashboard
        let d = document.createElement("div");
        d.style.cssText = "display:flex; justify-content:space-between; background:rgba(255,255,255,0.1); padding:5px; margin-bottom:5px; border-radius:5px;";
        d.innerHTML = `<span>${l.n}</span> <span style="color:#ff4444; cursor:pointer;" onclick="deleteLink(${i})">✖</span>`;
        list.appendChild(d);
    });
}

function deleteLink(index) {
    links.splice(index, 1);
    localStorage.setItem("links", JSON.stringify(links));
    renderLinks();
}

/* ON LOAD */
window.onload = () => {
    loadProfile();
    renderLinks();
}

/* DISCORD */
function discordLogin(){
    window.open("https://discord.com/login","_blank");
}
</script>

</body>
</html>
